$def with(contactos)
<h1>Lista de contactos</h1>
<button><a href="/">Index</a></button>

<table border="1" style="border-collapse: collapse; width: 100%; margin-top: 15px;">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Primer apellido</th>
        <th>Segundo apellido</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Ver</th>

    </tr>
    $for contacto in contactos:
        <tr>
            <td>$contacto['id_contacto']</td>
            <td>$contacto['nombre']</td>
            <td>$contacto['primer_apellido']</td>
            <td>$contacto['segundo_apellido']</td>
            <td>$contacto['email']</td>
            <td>$contacto['telefono']</td>
            <td><a href="/ver_contacto/$contacto['id_contacto']">Ver</a></td>
            <td><a href="/editar_contacto/$contacto['id_contacto']">Editar</a></td>
            <td><a href="/borrar_contacto/$contacto['id_contacto']">Borrar</a></td>
        </tr>
</table>
